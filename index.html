<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Itinéraire détaillé</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Itinéraire détaillé</h1>
      <p>Collez une URL Google Maps ou glissez un fichier GPX.</p>

      <div id="url-section">
        <input type="text" id="url-input" placeholder="https://www.google.com/maps/dir/..." />
        <button id="url-btn">Extraire</button>
      </div>

      <div class="separator">ou</div>

      <div id="dropzone">
        <span>Glissez votre fichier .gpx ici</span>
        <span class="sub">ou cliquez pour sélectionner</span>
        <input type="file" id="file-input" accept=".gpx" />
      </div>

      <div id="status"></div>

      <div id="result-wrapper">
        <div id="result-actions">
          <button id="copy-btn">Copier</button>
          <button id="map-btn">Générer une image</button>
        </div>
        <pre id="result"></pre>
        <div id="map-container">
          <img id="map-img" alt="Carte de l'itinéraire" />
          <button id="download-btn">Télécharger</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
